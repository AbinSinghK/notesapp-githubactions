name: Deploy to GKE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

  
    
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Auth GCP (OIDC)
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Configure Docker
      run: gcloud auth configure-docker

    - name: Build & Push Backend
      run: |
        docker build -t us-central1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/my-repo/backend ./backend
        docker push us-central1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/my-repo/backend

    - name: Build & Push Frontend
      run: |
        docker build -t us-central1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/my-repo/frontend ./frontend
        docker push us-central1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/my-repo/frontend

    - name: Deploy to GKE
      run: |
        gcloud container clusters get-credentials ${{ secrets.CLUSTER }} --zone ${{ secrets.ZONE }}
        kubectl apply -f k8s/